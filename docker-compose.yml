services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trivia
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trivia"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/trivia
      NODE_ENV: development
      ACCESS_TOKEN_SECRET: supersecretaccess
      REFRESH_TOKEN_SECRET: supersecretrefresh
      BREVO_API_KEY: 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
      BREVO_SENDER_EMAIL: smartiep73@gmail.com
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: ["sh", "/app/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_URL: ""
      # Optional: force rebuild cache refresh each compose up
      FORCE_COLOR: "1"
      NODE_ENV: development

volumes:
  db_data:
