
services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trivia
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trivia"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/trivia
      NODE_ENV: development
      ACCESS_TOKEN_SECRET: supersecretaccess
      REFRESH_TOKEN_SECRET: supersecretrefresh
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "
      npx prisma db push &&
      node prisma/seed.js &&
      npm run dev
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    volumes:
      - ./backend/uploads:/app/uploads  

volumes:
  db_data:
